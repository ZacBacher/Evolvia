<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Evolvia Technologies</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0f19;
      color: #e0e7ff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    @media (min-width: 768px) {
      .container {
        padding: 0 1.5rem;
      }
    }

    .mobile-menu-open {
      display: flex !important;
    }

    .bg-gradient-custom {
      background-image: linear-gradient(to right, #4c4e9c, #1f274a);
    }
  </style>
</head>

<body>

<!-- NAV -->
<header class="sticky top-0 z-50 bg-[#0b0f19]/80 backdrop-blur-md h-20">
  <div class="container flex items-center justify-between h-full">

    <img src="https://i.imgur.com/SLo5a8N.png" class="h-24 object-contain">

    <nav class="hidden md:flex space-x-8 text-sm font-medium">
      <a href="#services">Services</a>
      <a href="#testimonials">Testimonials</a>
      <a href="#schedule-call" class="px-6 py-2 bg-gradient-custom rounded-full text-white">Demo</a>
    </nav>

    <button id="mobile-menu-button" class="md:hidden">☰</button>
  </div>

  <nav id="mobile-menu" class="hidden flex-col items-center mt-4 space-y-4 text-white">
    <a href="#services">Services</a>
    <a href="#testimonials">Testimonials</a>
  </nav>
</header>

<!-- HERO -->
<section class="py-24 text-center">
  <h1 class="text-5xl font-bold text-white mb-6">
    AI Solutions for Hospitality
  </h1>
  <p class="text-gray-400 mb-8">
    Automate, upsell, and improve guest experience
  </p>
</section>

<!-- FOUNDERS -->
<section class="py-20 bg-[#0f1524]">
  <div class="container flex flex-col md:flex-row items-center justify-between gap-12">

    <div class="md:w-1/2">
      <h2 class="text-4xl font-bold text-white mb-4">
        Meet the Founders
      </h2>
      <p class="text-gray-400">
        Built by hospitality experts.
      </p>
    </div>

    <div class="md:w-1/2 flex flex-col items-center">

      <!-- Zac -->
      <div class="mb-8 text-center">
        <img src="https://i.imgur.com/a6zsTWD.jpeg"
             class="rounded-full w-32 h-32 md:w-40 md:h-40 flex-shrink-0 object-cover border-4 border-[#74a5ff] mb-4">
        <p class="font-semibold">Zac (Co-founder)</p>
      </div>

      <!-- Jonathan -->
      <div class="text-center">
        <img src="https://i.imgur.com/LFdPGP8.jpeg"
             class="rounded-full w-32 h-32 md:w-40 md:h-40 flex-shrink-0 object-cover border-4 border-[#74a5ff] mb-4">
        <p class="font-semibold">Jonathan (Co-founder)</p>
      </div>

    </div>
  </div>
</section>

<!-- TESTIMONIALS -->
<section id="testimonials" class="py-20">
  <div class="container grid md:grid-cols-3 gap-8">

    <div class="bg-[#1f274a] p-6 rounded-3xl text-center">
      <img src="https://i.imgur.com/ddzdDxl.jpeg"
           class="w-24 h-24 md:w-32 md:h-32 rounded-full object-cover flex-shrink-0 border-4 border-[#74a5ff] mb-4 mx-auto">
      <p class="font-bold">Leslie P.</p>
    </div>

    <div class="bg-[#1f274a] p-6 rounded-3xl text-center">
      <img src="https://i.imgur.com/b4brGaD.jpeg"
           class="w-24 h-24 md:w-32 md:h-32 rounded-full object-cover flex-shrink-0 border-4 border-[#74a5ff] mb-4 mx-auto">
      <p class="font-bold">Angelique M.</p>
    </div>

    <div class="bg-[#1f274a] p-6 rounded-3xl text-center">
      <img src="https://i.imgur.com/YGKqDX7.jpeg"
           class="w-24 h-24 md:w-32 md:h-32 object-contain border-4 border-[#74a5ff] mb-4 mx-auto">
      <p class="font-bold">Nonius</p>
    </div>

  </div>
</section>

<!-- CTA -->
<section id="schedule-call" class="py-20 text-center bg-[#0f1524]">
  <h2 class="text-4xl font-bold mb-6 text-white">
    Book a Demo
  </h2>
  <a href="https://calendly.com/evolviatech/30min"
     class="px-8 py-4 bg-gradient-custom rounded-full text-white font-bold">
    Schedule
  </a>
</section>

<script>
const btn = document.getElementById('mobile-menu-button');
const menu = document.getElementById('mobile-menu');

btn.addEventListener('click', () => {
  menu.classList.toggle('mobile-menu-open');
});
</script>

</body>
</html>
