<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

  <title>Evolvia Technologies - AI Solutions</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0f19;
      color: #e0e7ff;
      overflow-x: hidden;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    @media (min-width: 768px) {
      .container {
        padding: 0 1.5rem;
      }
    }
    .mobile-menu-open {
      display: flex !important;
    }
    .bg-gradient-custom {
      background-image: linear-gradient(to right, #4c4e9c, #1f274a);
    }
  </style>
</head>

<body>

<header class="sticky top-0 z-50 bg-[#0b0f19]/80 backdrop-blur-md h-20">
<div class="container flex items-center justify-between h-full">
<img src="https://i.imgur.com/SLo5a8N.png" class="h-36 md:h-44 object-contain">
</div>
</header>

<main>

<section class="py-20 lg:py-32 text-center">
<div class="container">
<h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6">
AI Solutions for Hospitality
</h1>
</div>
</section>

<section class="py-16 md:py-20 bg-[#0f1524]">

<h2 class="text-3xl md:text-5xl font-bold text-center mb-16 text-white">
Meet the Founders
</h2>

<div class="flex flex-col md:flex-row gap-12 justify-center items-center">

<div class="text-center">
<img src="https://i.imgur.com/a6zsTWD.jpeg"

<div class="text-center">
<img src="https://i.imgur.com/LFdPGP8.jpeg"
class="rounded-full w-32 h-32 md:w-40 md:h-40 object-cover border-4 border-[#74a5ff] mb-4">
<p class="text-lg font-semibold text-white">Jonathan (Co-founder)</p>
</div>

</div>
</div>
</section>

<section class="py-16 md:py-20">
<div class="container grid md:grid-cols-3 gap-8">

<div class="bg-[#1f274a] rounded-3xl p-6 text-center">
<img src="https://i.imgur.com/ddzdDxl.jpeg"
class="w-24 h-24 md:w-32 md:h-32 rounded-full object-cover border-4 border-[#74a5ff] mb-4 mx-auto">
<p class="font-bold text-white">Leslie P.</p>
</div>

<div class="bg-[#1f274a] rounded-3xl p-6 text-center">
<img src="https://i.imgur.com/b4brGaD.jpeg"

<div class="bg-[#1f274a] rounded-3xl p-6 text-center">

</div>

</div>
</section>

<section class="py-16 md:py-20 text-center bg-[#0f1524]">
<h2 class="text-3xl md:text-5xl font-bold text-white mb-6">
Schedule a Demo
</h2>

<a href="https://calendly.com/evolviatech/30min"
class="px-10 py-4 bg-gradient-custom text-white rounded-full font-bold">
Book Now
</a>
</section>

<script>
const mobileMenuButton = document.getElementById('mobile-menu-button');
const mobileMenu = document.getElementById('mobile-menu');
if(mobileMenuButton){
mobileMenuButton.addEventListener('click', () => {
mobileMenu.classList.toggle('mobile-menu-open');
});
}
</script>

</html>
